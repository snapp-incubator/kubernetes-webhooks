apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubernetes-webhooks.fullname" . }}-controller-manager-metrics-service
  labels:
    control-plane: controller-manager
  {{- include "kubernetes-webhooks.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  selector:
    app.kubernetes.io/name: kubernetes-webhooks
    control-plane: controller-manager
    {{- include "kubernetes-webhooks.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.metricsService.ports | toYaml | nindent 2 }}
