apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubernetes-webhooks.fullname" . }}-manager-role
  labels:
  {{- include "kubernetes-webhooks.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - cilium.io
  resources:
  - ciliumloadbalancerippools
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kubernetes-webhooks.fullname" . }}-manager-rolebinding
  labels:
  {{- include "kubernetes-webhooks.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "kubernetes-webhooks.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "kubernetes-webhooks.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
