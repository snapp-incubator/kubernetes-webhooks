apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubernetes-webhooks.fullname" . }}-webhook-service
  labels:
  {{- include "kubernetes-webhooks.labels" . | nindent 4 }}
spec:
  type: {{ .Values.webhookService.type }}
  selector:
    app.kubernetes.io/name: kubernetes-webhooks
    control-plane: controller-manager
    {{- include "kubernetes-webhooks.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.webhookService.ports | toYaml | nindent 2 }}
